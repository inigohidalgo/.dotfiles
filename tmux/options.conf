# =============================================================================
# Server environment
# =============================================================================
# When the server is spawned by the quake launcher it inherits a minimal
# launchd-style PATH, so popup commands can't find tmux/fzf/lazygit and die
# instantly. Prepend the Homebrew and /usr/local prefixes to the global
# environment, which every new pane/popup/run-shell picks up. The final tmux
# call runs under the just-built PATH so the binary resolves regardless of
# install prefix (ARM /opt/homebrew vs Intel /usr/local).
run-shell 'p="$PATH"; for d in /usr/local/bin /opt/homebrew/bin; do case ":$p:" in *":$d:"*) ;; *) p="$d:$p";; esac; done; PATH="$p" tmux set-environment -g PATH "$p"'


# =============================================================================
# Indexing & numbering
# =============================================================================
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1


# =============================================================================
# General options
# =============================================================================
set -g mouse on
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
# `on` not `always`: only apps that opt in via DECSET 2017 receive CSI u
# sequences. SSH doesn't opt in, so Shift+Enter into a nested SSH'd tmux
# does NOT reach inner apps — Shift+Enter in remote Claude Code submits
# instead of inserting a newline. `always` would fix that but risks stray
# CSI u garbage in legacy apps. Trade accepted: feature ≪ risk.
set -s extended-keys on


# =============================================================================
# Terminal & colors
# =============================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:usstyle"
set -as terminal-features ",xterm-256color:RGB:usstyle"
set -as terminal-features ",xterm*:extkeys"


# =============================================================================
# Window naming — keep names assigned via -n / rename-window stable
# =============================================================================
set -wg automatic-rename off
set -g allow-rename off
