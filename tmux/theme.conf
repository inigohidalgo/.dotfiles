# =============================================================================
# Appearance — shared base (accent + bar shape live in host-*.conf)
# =============================================================================
# ─── Catppuccin Mocha palette ────────────────────────────────────────────────
# Surfaces (deepest → most elevated)
#   crust      #11111b      mantle     #181825      base       #1e1e2e
#   surface0   #313244      surface1   #45475a      surface2   #585b70
# Text (dimmest → brightest)
#   overlay0   #6c7086      overlay1   #7f849c      overlay2   #9399b2
#   subtext0   #a6adc8      subtext1   #bac2de      text       #cdd6f4
# Accents
#   rosewater  #f5e0dc      flamingo   #f2cdcd      pink       #f5c2e7
#   mauve      #cba6f7      red        #f38ba8      maroon     #eba0ac
#   peach      #fab387      yellow     #f9e2af      green      #a6e3a1
#   teal       #94e2d5      sky        #89dceb      sapphire   #74c7ec
#   blue       #89b4fa      lavender   #b4befe
# ─────────────────────────────────────────────────────────────────────────────
# ─── Theme decisions (anchor when extending) ─────────────────────────────────
# Color roles:
#   mantle      bar base               (recessive)
#   surface0    elevated panels        (left, right indicators, inactive tabs)
#   surface1    structural lines       (pane borders, dividers)
#   <accent>    primary accent         (active window + active pane border)
#               per-host: blue = local/outer, peach = remote/inner — the
#               warm/cool contrast makes "which layer am I in?" obvious
#   mauve       selection              (copy-mode)
#   yellow      notifications          (message banner + command prompt)
#   text        primary fg
#   subtext0    inactive pane body fg
#   overlay1    inactive window text
#
# Layering: mantle (bar) < surface0 (panels) < accent (focus). Pick a tier
# first. Active window highlight and active pane border share the accent
# intentionally — both signal "current focus." Keep them in sync per host.
# ─────────────────────────────────────────────────────────────────────────────

# panes
set -g pane-border-style "fg=#45475a"

setw -g window-style "fg=#a6adc8"
setw -g window-active-style "fg=terminal,bg=terminal"

# status bar
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g window-status-style "bg=#313244,fg=#7f849c"
set -g mode-style "bg=#cba6f7,fg=#1e1e2e"
set -g message-style "bg=#f9e2af,fg=#1e1e2e"
set -g message-command-style "bg=#1e1e2e,fg=#f9e2af"
set -g window-status-format "  #I:#W#F  "
set -g window-status-current-format "  #I:#W#F  "
set -g window-status-separator ""

set -g status-justify absolute-centre
set -g status-right "#{?#{||:#{pane_in_mode},#{||:#{pane_synchronized},#{window_zoomed_flag}}},#[bg=#313244] [#{?pane_in_mode, C,}#{?pane_synchronized, S,}#{?window_zoomed_flag, Z,} ] #[default],}#{?client_prefix, #[bg=#313244] [^] #[default],}"
