# =============================================================================
# Host overrides — remote (inner, reached over SSH inside outer tmux)
# =============================================================================
# Sourced last: everything here overrides the shared confs.
# Intentionally dropped vs host-local (see tmux/README.md):
#   - set-titles: outer tmux owns the terminal title
#   - pane-border-status row: outer already labels the SSH pane; would stack
#   - status-left-length: the static ` ssh ` label has bounded width

# Prefix — M-a (Opt+A) so it doesn't collide with outer C-a. Same letter,
# one mod added; Ghostty treats Opt as Meta, and ESC+a round-trips through
# SSH and the outer tmux trivially.
unbind C-b
set -g prefix M-a

# Theme: peach accent (inner-layer cue), lean bar
set -g pane-active-border-style "fg=#fab387,bold"
set -g window-status-current-style "bg=#fab387,fg=#1e1e2e,bold"
set -g status-left "#[bg=#313244] ssh #[default]"
