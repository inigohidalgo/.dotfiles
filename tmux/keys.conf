# =============================================================================
# Key bindings — sessions & config
# =============================================================================
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind R source-file ~/.config/tmux/tmux.conf \; \
       display-message "Config reloaded!"


# =============================================================================
# Key bindings — windows & panes
# =============================================================================
# create
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# break the current pane out into a new window in this session, following it
bind B break-pane

# navigate panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# navigate windows
bind -r C-k previous-window
bind -r C-j next-window

# move windows
bind -r "<" swap-window -d -t "{previous}"
bind -r ">" swap-window -d -t "{next}"

# swap panes
bind -r "{" swap-pane -U
bind -r "}" swap-pane -D

# promote current pane to the main slot (index 1) + main-vertical layout,
# keeping focus on the moved pane (swap-pane otherwise lands on index 1's old occupant)
bind M-m swap-pane -t 1 \; select-layout main-vertical \; select-pane -t 1

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
