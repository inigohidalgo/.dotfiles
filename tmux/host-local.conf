# =============================================================================
# Host overrides — local (outer) machine
# =============================================================================
# Sourced last: everything here overrides the shared confs.

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Title — outer tmux owns the terminal title (inner can't set it through nesting)
set -g set-titles on
set -g set-titles-string "⎈ #S · #W"

# Theme: blue accent, full status bar
set -g pane-active-border-style "fg=#89b4fa,bold"
set -g pane-border-status top
set -g pane-border-format " #P · #{pane_current_command} "
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g status-left-length 46
set -g status-left "#[bg=#313244] #S #[default]"
