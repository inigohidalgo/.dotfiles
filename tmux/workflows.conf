# =============================================================================
# Workflows
# =============================================================================
# New timestamped chat in the chat-quick session (drives `clauder quake new`).
# Absolute path sidesteps run-shell PATH-inheritance variance; -E merges
# stderr so failures surface in the pane's view-mode.
bind C run-shell -E "~/.local/bin/clauder quake new"

# Lazygit in a popup, scoped to the current pane's directory.
# `-d` sets the popup's cwd so lazygit picks up the right repo; `-E` closes
# the popup when lazygit exits.
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# Fuzzy window switcher across all sessions (shadows default `prefix s`).
#
# Pipeline:
#   list-windows ──▶ sort ──▶ cut ──▶ awk ──▶ fzf ──▶ cut ──▶ switch-client
#
# Sort order: sessions by `session_last_attached` desc, windows by index asc
# within each session. So recently-used sessions cluster on top, with their
# windows in natural order. Sort keys are prepended as fields 1-2 and stripped
# by the first cut. (`-k1,1nr -k2,2n` = numeric reverse on key 1, numeric on key 2.)
#
# After the strip, each fzf row has two pipe-separated fields:
#   field 1 = "session:index"  ← machine target, hidden via `--with-nth=2`
#   field 2 = "session → window  [Np]"  ← human display, what you fuzzy-match
# After picking, the second cut extracts field 1 for `switch-client -t`.
#
# Two-pass awk: first stores all rows + tracks max display width, then in END
# emits with `%-*s` width = max+2 so the [Np] column aligns. Note `length()`
# counts bytes — the `→` is 3 UTF-8 bytes — so alignment is in bytes, not
# visible cols. Equally off on every row, so it visually aligns regardless.
#
# Escaping convention inside this tmux double-quoted string:
#   \"  → "    (so awk sees its own quoted strings)
#   \$  → $    (awk's $1/$2/$3/$4 — fish never expands; it's inside awk's '...')
#   \\n → \n   (literal backslash-n in awk's printf format string)
#   \\| → \|   (fzf's -d delimiter is a regex: a bare | is alternation that
#   matches the empty string between every character, splitting each char
#   into its own field — escaped, it's a literal pipe separator)
#   `\` at end of a line continues to the next line during tmux config parse,
#   joining everything into one logical command before the shell sees it.
#
# Preview: `capture-pane -p` writes the visible pane content to stdout, `-e`
# emits ANSI colors, and fzf's `--ansi` renders them. `{1}` is fzf's first-
# field placeholder (with `-d '|'`) — that's our session:index target.
#
# Sharp edges:
#   - `|` in a window/session name would break the delimiter. Unlikely in
#     practice; if it ever happens, swap delimiter to a tab or `:::`.
#   - `xargs -r` makes Esc/Ctrl-C in fzf a clean no-op (empty input → skip).
#   - Active pane only in preview — multi-pane windows show just the focused one.
#   - `session_last_attached` updates on attach/switch-client, not on every
#     keystroke. So order is stable while you work in one place.
bind s display-popup -E -w 90% -h 80% \
  "tmux list-windows -a -F '#{session_last_attached}|#I|#S:#I|#S|#W|#{window_panes}' \
   | sort -t'|' -k1,1nr -k2,2n \
   | cut -d'|' -f3- \
   | awk -F'|' '\
       { t[NR]=\$1; d[NR]=\$2\" → \"\$3; c[NR]=\$4; \
         if (length(d[NR])>m) m=length(d[NR]) } \
       END { for (i=1;i<=NR;i++) \
               printf \"%s|%-*s [%sp]\\n\", t[i], m+2, d[i], c[i] }' \
   | fzf --reverse -d '\\|' --with-nth=2 --ansi \
       --preview 'tmux capture-pane -ep -t {1}' \
       --preview-window=right:50% \
   | cut -d'|' -f1 \
   | xargs -r tmux switch-client -t"

# Move the current pane into a fuzzy-picked window, then follow it there.
#
# Same picker as `bind s` above (pipeline shape + escaping convention live in
# that block). Unlike `bind s`, which happens to be shell-agnostic, this binding
# is written for fish deliberately: popups run under `default-shell` (fish here),
# and we need two values resolved at launch, which fish captures with `set`.
# Three deltas from `bind s`:
#
#   1. `set src` / `set cur` grab the originating pane and window up front via
#      `display-message`. ($TMUX_PANE is NOT inherited into popups — it resolves
#      empty — but `display-message` reports the client's active pane/window from
#      inside the popup, so that is the source of truth.)
#   2. The carried target field is `#{window_id}` (a stable `@N`) instead of
#      `#S:#I`. With `renumber-windows on` (options.conf), moving a pane that is
#      ALONE in its window closes that window and renumbers its session, so an
#      index captured pre-move can go stale. A window-id never does — `join-pane`
#      and `switch-client` both target the same `@id`. It doubles as the preview
#      target ({1}) just like `#S:#I` did.
#   3. An awk guard (`$1==cur`) drops the launching window from the list so you
#      can't pick it and eat a "can't join to its own window" error. We exclude
#      it by *id*, not via `list-windows -f` on active+attached: you routinely
#      run several attached sessions at once, and that filter would also drop
#      every OTHER session's active window — ones you may want to move into.
#      (`n`, not `NR`, counts kept rows so the skip never emits a blank line.)
#
# The tail moves instead of switches: `xargs` feeds the chosen `@id` to one tmux
# invocation chaining `join-pane -s $src` then `switch-client` (the literal ';'
# is tmux's command separator). `-s $src` is explicit because `join-pane`'s
# default source is the *marked* pane if one is set (you have a Mark binding),
# which would silently move the wrong pane.
#
# Landing geometry: `-h -f -l 25%` puts the pane down the right edge at 25% of
# the *window's* width, full height. `-f` (full) is the load-bearing flag —
# without it a split is carved out of the target's ACTIVE pane only (so `-l 25%`
# would be 25% of that pane and the result would sit wherever that pane is); `-f`
# measures against the whole window, so no per-pane arithmetic and the existing
# layout just compresses to the left. `-h` = side-by-side (vs `-v` stacked); no
# `-b` lands it right/below, add `-b` for left/above. `xargs -r` makes Esc/Ctrl-C
# a clean no-op.
bind b display-popup -E -w 90% -h 80% "\
  set -l cur (tmux display-message -p '#{window_id}'); \
  set -l src (tmux display-message -p '#{pane_id}'); \
  tmux list-windows -a -F '#{session_last_attached}|#I|#{window_id}|#S|#W|#{window_panes}' \
   | sort -t'|' -k1,1nr -k2,2n \
   | cut -d'|' -f3- \
   | awk -F'|' -v cur=\$cur '\
       \$1==cur { next } \
       { n++; t[n]=\$1; d[n]=\$2\" → \"\$3; c[n]=\$4; \
         if (length(d[n])>m) m=length(d[n]) } \
       END { for (i=1;i<=n;i++) \
               printf \"%s|%-*s [%sp]\\n\", t[i], m+2, d[i], c[i] }' \
   | fzf --reverse -d '\\|' --with-nth=2 --ansi \
       --preview 'tmux capture-pane -ep -t {1}' \
       --preview-window=right:50% \
   | cut -d'|' -f1 \
   | xargs -r -I'{}' tmux join-pane -h -f -l 25% -s \$src -t '{}' ';' switch-client -t '{}'"
